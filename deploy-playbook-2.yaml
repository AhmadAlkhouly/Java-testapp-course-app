---
- hosts: web
  serial: 1
  become: yes
  become_method: sudo

  vars:
    war_file: v1-devopsarea-1.0.war
    tomcat_package: tomcat9
    tomcat_service: tomcat9
    tomcat_webapps: /var/lib/tomcat9/webapps

  tasks:
    - name: Install Java
      apt:
        name: default-jdk
        state: present
        update_cache: yes

    - name: Install Tomcat
      apt:
        name: "{{ tomcat_package }}"
        state: present

    - name: Install Tomcat admin
      apt:
        name: tomcat9-admin
        state: present

    - name: Configure Tomcat users
      copy:
        src: tomcat-users.xml
        dest: /etc/tomcat9/tomcat-users.xml
        owner: root
        group: tomcat
        mode: "0640"
      notify: Restart Tomcat

    - name: Allow Tomcat port
      ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: Deploy WAR package to Tomcat
      copy:
        src: "./target/{{ war_file }}"
        dest: "{{ tomcat_webapps }}/{{ war_file }}"
        owner: tomcat
        group: tomcat
        mode: "0644"
      notify: Restart Tomcat

    - name: Wait for Tomcat to start
      wait_for:
        port: 8080
        delay: 5
        timeout: 60

  handlers:
    - name: Restart Tomcat
      service:
        name: "{{ tomcat_service }}"
        state: restarted
